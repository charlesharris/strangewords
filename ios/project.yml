name: Strangewords
options:
  bundleIdPrefix: com.strangewords
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  Strangewords:
    type: application
    platform: iOS
    sources:
      - Strangewords
    info:
      path: Strangewords/Info.plist
      properties:
        CFBundleDisplayName: Stranger Words
        # Bundled type voices (Resources/Fonts). Fraunces is the display serif
        # (it optically sizes itself via its opsz axis); Inter is the body/chrome
        # sans. iOS auto-registers anything listed here at launch.
        UIAppFonts:
          - Fraunces.ttf
          - Fraunces-SemiBold.ttf
          - Fraunces-Italic.ttf
          - Inter.ttf
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Dev-only: allow plain HTTP to the local backend during bring-up.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.strangewords.app
